<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting to Gabet...</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f5f5f5; }
        .container { text-align: center; padding: 2rem; }
        p { color: #666; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="container">
        <p>Redirecting to Gabet...</p>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const state = params.get('state');
        const error = params.get('error');

        if (code) {
            let url = 'gabet://notion-callback?code=' + encodeURIComponent(code);
            if (state) url += '&state=' + encodeURIComponent(state);
            window.location.href = url;
        } else if (error) {
            document.querySelector('p').textContent = 'Authorization was denied. You can close this page.';
        } else {
            document.querySelector('p').textContent = 'Something went wrong. You can close this page.';
        }
    </script>
</body>
</html>
